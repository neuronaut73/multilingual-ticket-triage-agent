historical_type_hints:
  Incident:
    interpretation: Operational issue or interruption. Weak contextual signal only;
      not a hard urgency rule.
  Problem:
    interpretation: Underlying or recurring issue. Weak contextual signal only.
  Request:
    interpretation: Customer request or information need. Weak contextual signal only.
  Change:
    interpretation: Change request. Weak contextual signal only.
