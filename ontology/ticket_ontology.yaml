meta:
  source_csv: data/aa_dataset-tickets-multi-lang-5-2-50-version.csv
  total_tickets: 28587
  min_tag_count: 5
  note: Kaggle labels (queue, priority, type, tag_1..tag_8) are historical evidence
    and proxy evaluation data only. They are not the final HDI assignment output schema.
    The assignment output schema is defined under assignment_triage_fields.
assignment_triage_fields:
  topic:
    allowed_values:
    - Policy / Contract
    - Claims / Damage
    - Billing / Payment
    - Technical / Online Access
    - Other
  urgency:
    allowed_values:
    - Low
    - Medium
    - High
  next_action:
    allowed_values:
    - send_standard_faq_or_self_service_link
    - create_or_update_claim
    - forward_to_billing_team
    - forward_to_technical_support
    - escalate_to_human_supervisor
    - ask_for_more_information
assignment_topic_hints:
  Policy / Contract:
    description: Policy documents, coverage, contract changes, cancellation, address
      changes, subscriptions, plans, warranty, product terms.
    example_signals:
    - policy
    - contract
    - coverage
    - cancellation
    - subscription
    - plan
    - warranty
    - license
    - pricing
    - product
  Claims / Damage:
    description: New or existing insurance claim, accident, damage, theft, loss, repair,
      reimbursement.
    example_signals:
    - claim
    - damage
    - accident
    - theft
    - loss
    - repair
    - reimbursement
    - incident
    - investigation
  Billing / Payment:
    description: Premium, invoice, payment, refund, duplicate charge, direct debit,
      transaction or billing issue.
    example_signals:
    - billing
    - payment
    - invoice
    - refund
    - transaction
    - reconciliation
    - financial
    - cost
    - premium
    - charge
  Technical / Online Access:
    description: Login, app, portal, password, online account, authentication, access,
      outage or technical issue.
    example_signals:
    - login
    - password
    - authentication
    - access
    - portal
    - app
    - online
    - IT
    - technical
    - bug
    - outage
    - network
  Other:
    description: Unclear, out-of-scope, HR, marketing, sales, generic support or insufficient
      information.
    example_signals:
    - HR
    - Human Resources
    - Marketing
    - Sales
    - Advertising
    - Feedback
